services:
  - type: web
    name: gailexa-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_APP_CLIENT_ID
        sync: false
      - key: VITE_TENANT_ID
        sync: false
      - key: VITE_DIRECT_CONNECT_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
